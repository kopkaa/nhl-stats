query GetGoalieLeaders($limit: Int) {
  goalieLeaders(limit: $limit) {
    wins {
      playerId
      firstName
      lastName
      headshot
      teamName
      teamLogo
      value
    }
    savePctg {
      playerId
      firstName
      lastName
      headshot
      teamName
      teamLogo
      value
    }
    shutouts {
      playerId
      firstName
      lastName
      headshot
      teamName
      teamLogo
      value
    }
  }
}
